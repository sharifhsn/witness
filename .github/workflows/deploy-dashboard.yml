name: Deploy dashboard to GitHub Pages

on:
  workflow_run:
    workflows: ["Run targets pipeline"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - dashboard.qmd
      - _quarto.yml
      - R/visualize.R
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    env:
      RENV_PATHS_ROOT: ~/.cache/R/renv

    steps:
      - uses: actions/checkout@v4

      # When triggered by pipeline completion, download its targets store
      # instead of re-running the entire pipeline
      - name: Download targets store from pipeline
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: targets-store
          path: _targets/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # When triggered directly (push/dispatch), restore from cache and run pipeline
      - name: Restore targets cache
        if: github.event_name != 'workflow_run'
        uses: actions/cache@v4
        with:
          path: _targets/
          key: targets-${{ hashFiles('_targets.R', 'R/*.R') }}-${{ github.run_id }}
          restore-keys: |
            targets-${{ hashFiles('_targets.R', 'R/*.R') }}-
            targets-

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev \
            libglpk-dev libgeos-dev libproj-dev

      - uses: r-lib/actions/setup-renv@v2

      - name: Run targets pipeline
        if: github.event_name != 'workflow_run'
        run: targets::tar_make()
        shell: Rscript {0}

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render dashboard
        run: quarto render dashboard.qmd

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
